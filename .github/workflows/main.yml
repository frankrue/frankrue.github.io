name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Create .nojekyll
        run: touch ./.nojekyll

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          path: ./
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
